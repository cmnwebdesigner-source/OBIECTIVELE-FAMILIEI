<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body{font-family:Arial,sans-serif;background:#f8fafc;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#0f172a}
    .card{background:white;border:1px solid #e2e8f0;border-radius:24px;box-shadow:0 10px 30px rgba(15,23,42,.08);max-width:420px;width:100%;padding:24px}
    h1{margin:0 0 8px;font-size:24px}.muted{color:#64748b;font-size:14px}.row{padding:12px 0;border-top:1px solid #e2e8f0}.ok{color:#16a34a;font-weight:700}.bad{color:#dc2626;font-weight:700}.code{font-family:monospace;background:#f1f5f9;border-radius:10px;padding:10px;margin-top:8px;white-space:pre-wrap;font-size:12px;overflow:auto}.btn{background:#4f46e5;color:white;border:0;border-radius:12px;padding:12px 16px;font-weight:700;width:100%;margin-top:14px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Test aplicație</h1>
    <p class="muted">Dacă vezi pagina asta, GitHub Pages deschide corect fișierul index.html.</p>
    <div class="row" id="cdn">Verific Supabase CDN...</div>
    <div class="row" id="db">Verific baza de date...</div>
    <div class="row" id="auth">Verific sesiunea...</div>
    <button class="btn" onclick="location.reload()">Reîncarcă testul</button>
    <div class="code" id="details">Pornesc...</div>
  </div>
<script>
const SUPABASE_URL = 'https://hfqsouqtqvyxegcrabnc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eqlbyUXpwcp-i-dPhFPsmA_wHqDW1AD';
const details = document.getElementById('details');
function write(id, ok, text){ document.getElementById(id).innerHTML = `<span class="${ok?'ok':'bad'}">${ok?'OK':'EROARE'}</span> — ${text}`; }
function log(x){ details.textContent += '\n' + x; }
(async function(){
  details.textContent = 'URL: ' + SUPABASE_URL + '\nKey începe cu: ' + SUPABASE_KEY.slice(0,18) + '...';
  try{
    if(!window.supabase || !window.supabase.createClient){
      write('cdn', false, 'Supabase CDN nu s-a încărcat. Ai internet/adblock?');
      write('db', false, 'Nu pot testa fără CDN.');
      write('auth', false, 'Nu pot testa fără CDN.');
      return;
    }
    write('cdn', true, 'Scriptul Supabase s-a încărcat.');
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth:{persistSession:true, autoRefreshToken:true} });
    const { error } = await client.from('goals').select('id', { count:'exact', head:true });
    if(error){
      write('db', false, error.message);
      log('DB error: ' + JSON.stringify(error, null, 2));
    } else {
      write('db', true, 'Tabelul goals poate fi citit. Supabase e conectat.');
    }
    const { data, error: authError } = await client.auth.getSession();
    if(authError){
      write('auth', false, authError.message);
      log('Auth error: ' + JSON.stringify(authError, null, 2));
    } else {
      write('auth', true, data.session ? 'Ești deja conectat.' : 'Nu ești conectat, dar Auth răspunde corect.');
    }
    log('Test terminat.');
  }catch(e){
    write('cdn', false, 'Eroare JavaScript.');
    write('db', false, e.message || e);
    write('auth', false, 'Oprit din cauza erorii.');
    log('JS exception: ' + (e.stack || e.message || e));
  }
})();
</script>
</body>
</html>
